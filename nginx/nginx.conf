events { worker_connections 1024; }

http {
  upstream crm      { server crm:3000; }
  upstream api      { server api:4000; }
  upstream site_001 { server site-001-ai:3000; }
  upstream site_002 { server site-002-finance:3000; }

  upstream site_3003 { server site-003-pets:3000; }

  upstream site_3004 { server site-002:3000; }

  upstream site_3005 { server site-004:3000; }

  upstream site_3008 { server site-007-video-editor:3000; }

  # CRM Admin Dashboard → localhost/admin
  server {
    listen 80;
    server_name localhost crm.zoyzoy.local;
    location / { proxy_pass http://crm; proxy_set_header Host $host; }
  }

  # API → localhost:4000 (direct)
  server {
    listen 4000;
    location / { proxy_pass http://api; proxy_set_header Host $host; }
  }

  # Site 001 — AI Insider Daily
  server {
    listen 3001;
    server_name site001.zoyzoy.local aiinsiderdaily.com www.aiinsiderdaily.com;
    location / { proxy_pass http://site_001; proxy_set_header Host $host; }
  }

  # Site 002 — Finance Daily
  server {
    listen 3002;
    server_name site002.zoyzoy.local financedaily.com www.financedaily.com;
    location / { proxy_pass http://site_002; proxy_set_header Host $host; }
  }

  # Site: site-003-pets (auto-provisioned)
  server {
    listen 3003;
    server_name site-003-pets.zoyzoy.local pet-care-nyc.com www.pet-care-nyc.com;
    location / { proxy_pass http://site_3003; proxy_set_header Host $host; }
  }

  # Site: site-002 (auto-provisioned)
  server {
    listen 3004;
    server_name site-002.zoyzoy.local financedaily.com www.financedaily.com;
    location / { proxy_pass http://site_3004; proxy_set_header Host $host; }
  }

  # Site: site-004 (auto-provisioned)
  server {
    listen 3005;
    server_name site-004.zoyzoy.local health-awareness.com www.health-awareness.com;
    location / { proxy_pass http://site_3005; proxy_set_header Host $host; }
  }

  # Site: site-007-video-editor (FrameForge)
  server {
    listen 3008;
    server_name site-007-video-editor.zoyzoy.local frameforge.skoolai.cloud www.frameforge.skoolai.cloud;
    location / { proxy_pass http://site_3008; proxy_set_header Host $host; }
  }
}
